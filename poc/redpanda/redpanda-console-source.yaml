apiVersion: v1
kind: ConfigMap
metadata:
  name: redpanda-console-source-config
  namespace: messaging
data:
  config.yaml: |
    kafka:
      brokers:
        - source-kafka-kafka-bootstrap:9092
      schemaRegistry:
        enabled: true
        urls:
          - http://<MINIKUBE_SINK>:32080/apis/ccompat/v7
    connect:
      enabled: true
      clusters:
        - name: "source-connect"
          url: "http://source-connect-connect-api:8083"
    server:
      listenPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda-console-source
  namespace: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda-console-source
  template:
    metadata:
      labels:
        app: redpanda-console-source
    spec:
      containers:
        - name: redpanda-console
          image: docker.redpanda.com/redpandadata/console:v2.8.0
          args:
            - --config.filepath=/etc/console/config.yaml
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: console-config
              mountPath: /etc/console
              readOnly: true
      volumes:
        - name: console-config
          configMap:
            name: redpanda-console-source-config
            items:
              - key: config.yaml
                path: config.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda-console-source
  namespace: messaging
spec:
  selector:
    app: redpanda-console-source
  ports:
    - name: http
      port: 8080
      targetPort: 8080

