apiVersion: kafka.strimzi.io/v1
kind: KafkaConnector
metadata:
  name: source-postgres-connector
  namespace: messaging
  labels:
    strimzi.io/cluster: source-connect
spec:
  class: io.debezium.connector.postgresql.PostgresConnector
  tasksMax: 1
  config:
    database.hostname: source-postgres.database.svc.cluster.local
    database.port: 5432
    database.user: postgres
    database.password: SOURCE_DB_PASSWORD
    database.dbname: source_db
    database.server.name: source
    plugin.name: pgoutput
    table.include.list: public.weather_readings
    topic.prefix: source
    slot.name: source_slot
