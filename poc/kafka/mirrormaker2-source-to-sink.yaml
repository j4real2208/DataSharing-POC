apiVersion: kafka.strimzi.io/v1
kind: KafkaMirrorMaker2
metadata:
  name: source-to-sink
  namespace: messaging
spec:
  version: 4.1.1
  replicas: 1
  target:
    alias: sink
    bootstrapServers: SINK_BOOTSTRAP
    groupId: source-to-sink-group
    configStorageTopic: source-to-sink-config
    offsetStorageTopic: source-to-sink-offset
    statusStorageTopic: source-to-sink-status
    config:
      config.storage.replication.factor: -1
      offset.storage.replication.factor: -1
      status.storage.replication.factor: -1
  mirrors:
    - source:
        alias: source
        bootstrapServers: source-kafka-kafka-bootstrap:9092
      sourceConnector:
        tasksMax: 1
        config:
          replication.factor: -1
          offset-syncs.topic.replication.factor: -1
          sync.topic.acls.enabled: "false"
          refresh.topics.interval.seconds: 600
      checkpointConnector:
        tasksMax: 1
        config:
          checkpoints.topic.replication.factor: -1
          sync.group.offsets.enabled: "false"
          refresh.groups.interval.seconds: 600
      topicsPattern: ".*"
      groupsPattern: ".*"
