apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: source-dual-role
  namespace: messaging
  labels:
    strimzi.io/cluster: source-kafka
spec:
  replicas: 1
  roles:
    - broker
    - controller
  storage:
    type: jbod
    volumes:
      - id: 0
        type: ephemeral
        kraftMetadata: shared
